<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yandex.Bike Status</title>
    <style>
        :root { --y-yellow: #ffcc00; --s-green: #00c136; --e-red: #f33333; --bg: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .app { width: 100%; max-width: 450px; }
        .header { text-align: center; margin: 20px 0; }
        .logo { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; }
        .logo span { background: var(--y-yellow); padding: 2px 8px; border-radius: 8px; margin-left: 4px; }
        .card { background: #fff; padding: 24px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 18px; font-size: 24px; border: 2px solid #e5e5ea; border-radius: 18px; box-sizing: border-box; text-align: center; font-weight: 700; text-transform: uppercase; outline: none; appearance: none; }
        input:focus { border-color: var(--y-yellow); background: #fffdf2; }
        button { width: 100%; padding: 18px; background: var(--y-yellow); border: none; border-radius: 18px; font-size: 18px; font-weight: 700; margin-top: 15px; cursor: pointer; }
        button:active { transform: scale(0.96); }
        #res { margin-top: 20px; display: none; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .status-box { padding: 30px 20px; text-align: center; color: white; }
        .pt { background: var(--s-green); }
        .ft { background: var(--e-red); }
        .label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; margin-bottom: 8px; }
        .main-status { font-size: 28px; font-weight: 900; }
        .pill { display: inline-flex; background: rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 100px; font-size: 14px; font-weight: 700; margin-top: 12px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo">Yandex<span>Bike</span></div>
        <div style="color: #8e8e93; font-size: 14px; margin-top: 8px;">База: МСК (142) и СПБ (50)</div>
    </div>
    <div class="card">
        <input type="text" id="b" placeholder="YA000X" autocomplete="off" spellcheck="false">
        <button onclick="c()">ПРОВЕРИТЬ</button>
    </div>
    <div id="res"></div>
</div>

<script>
    // МОСКВА (База из файла + новые 26 номеров)
    const m = ["YA001A","YA015C","YA028X","YA036P","YA049C","YA063P","YA073B","YA078C","YA081B","YA088P","YA102P","YA118C","YA118X","YA126C","YA135C","YA135T","YA144T","YA146C","YA152T","YA153T","YA182T","YA184C","YA184T","YA192T","YA195T","YA203A","YA208P","YA213P","YA244C","YA265C","YA290C","YA329O","YA336T","YA358T","YA364C","YA380X","YA382T","YA391C","YA406T","YA429T","YA433C","YA436P","YA437P","YA450O","YA453C","YA498O","YA499O","YA501A","YA508O","YA513C","YA514C","YA530B","YA536C","YA539C","YA546T","YA564O","YA576X","YA587C","YA591B","YA631T","YA664T","YA690O","YA696O","YA698C","YA713T","YA751C","YA768O","YA793C","YA796P","YA822C","YA832O","YA836P","YA837T","YA851T","YA852C","YA855T","YA856C","YA876T","YA881B","YA882C","YA883C","YA884C","YA885C","YA887B","YA888C","YA889C","YA890C","YA891C","YA892B","YA893C","YA894B","YA895C","YA896C","YA897C","YA898C","YA899C","YA900C","YA901C","YA902C","YA905C","YA906B","YA907C","YA908C","YA909C","YA910C","YA911C","YA912C","YA913C","YA914C","YA915C","YA916C","YA917C","YA918C","YA919C","YA920C","YA884O","YA899T","YA900T","YA924C","YA928O","YA945C","YA952C","YA960O","YA963P","YA973C","YA979T","YA981P","YA999C","YX021A","YX287A","YX288A","YX289A","YX347A","YX351A","YX398A","YX408A","YX415A","YX421A","YX422A","YX423A","YX759A"];
    
    // САНКТ-ПЕТЕРБУРГ (Полный список из файла)
    const s = ["YA220M","YA221P","YA249M","YA486C","YA632T","YA654C","YA733P","YA904O","YA944M","YA959O","YX005H","YX182C","YX243C","YX458C","YX460C","YX461C","YX474B","YX496B","YX497B","YX507B","YX511B","YX518B","YX519B","YX520B","YX522B","YX523B","YX542B","YX544B","YX552B","YX605B","YX606B","YX615B","YX630B","YX648B","YX649B","YX654B","YX655B","YX661B","YX668B","YX670B","YX673B","YX685B","YX686B","YX691B","YX697B","YX699B","YX700B","YX857C","YX990C","YX999C"];

    function c() {
        const v = document.getElementById('b').value.trim().toUpperCase();
        const r = document.getElementById('res');
        if (!v) return;
        r.style.display = "block";
        const iM = m.includes(v);
        const iS = s.includes(v);
        if (iM || iS) {
            r.innerHTML = `<div class="status-box pt"><div class="label">Аренда</div><div class="main-status">ПАРТ-ТАЙМ ✅</div><div class="pill">📍 ${iM ? 'МОСКВА' : 'СПБ'}</div></div>`;
        } else {
            r.innerHTML = `<div class="status-box ft"><div class="label">Аренда</div><div class="main-status">ФУЛЛ-ТАЙМ 🛑</div><div style="margin-top:10px; font-size:14px; opacity:0.8;">Номер не найден в списках</div></div>`;
        }
        document.activeElement.blur();
    }
    document.getElementById('b').addEventListener('keypress', (e) => { if (e.key === 'Enter') c(); });
</script>
</body>
</html>
